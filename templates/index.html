<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fencing Coach</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4a7fd4 0%, #1e3a7a 50%, #0f1f4a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1em; }

        .sign-out {
            position: absolute;
            top: 0; right: 0;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            text-decoration: none;
        }

        .nav-card {
            display: block;
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s;
        }

        .nav-card:active { transform: scale(0.98); }

        .nav-card-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .nav-card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .nav-card-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Fencing Coach</h1>
            <p>Ethan's training companion</p>
            <a href="/logout" class="sign-out">Sign out</a>
        </div>

        <a href="/tips" class="nav-card">
            <div class="nav-card-icon">📖</div>
            <div class="nav-card-title">Competition Tips</div>
            <div class="nav-card-desc">Upload voice memos and review coaching advice organized by category.</div>
        </a>

        <a href="/lessons" class="nav-card">
            <div class="nav-card-icon">🎥</div>
            <div class="nav-card-title">Private Lessons</div>
            <div class="nav-card-desc">Video library of techniques from training sessions.</div>
        </a>

        <a href="/tournaments" class="nav-card">
            <div class="nav-card-icon">🏆</div>
            <div class="nav-card-title">Tournaments</div>
            <div class="nav-card-desc">Track results and pool performance with photo extraction.</div>
        </a>
    </div>
</body>
</html>
