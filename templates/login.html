<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fencing Tips — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2c3e6b 0%, #1a2540 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .error {
            background: #fff0f0;
            color: #c0392b;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }

        input[type="password"]:focus {
            border-color: #2c3e6b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2c3e6b 0%, #1a2540 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:active {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">🤺</div>
        <h1>Fencing Coach</h1>
        <p class="subtitle">Enter the password to continue</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
